name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate environment.ts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
        run: |
          mkdir -p src/environment
          cat > src/environment/environment.ts <<EOF
          export const environment = {
              firebaseApiKey: '${FIREBASE_API_KEY}',
              reCaptchaKey: '${RECAPTCHA_KEY}'
          };
          EOF

      - run: npm run lint
      - run: npm test

      # Build before e2e: the prerender tests serve dist/cv/browser.
      - run: npm run build

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - run: npm run e2e

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # firebase-tools is a devDependency, so the deploy uses the
      # lockfile-pinned version instead of whatever `npm i -g` resolves.
      - run: npm ci

      - name: Deploy to Firebase
        run: npx firebase deploy --only hosting,firestore:rules --project cvpp-2bfc2 --non-interactive

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate environment.ts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
        run: |
          mkdir -p src/environment
          cat > src/environment/environment.ts <<EOF
          export const environment = {
              firebaseApiKey: "${FIREBASE_API_KEY}",
              reCaptchaKey: "${RECAPTCHA_KEY}"
          };
          EOF

      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        run: |
          npm i -g firebase-tools
          firebase deploy --only hosting,firestore:rules --project cvpp-2bfc2 --non-interactive

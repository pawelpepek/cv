<app-double-li [liClass]="liClass()">
    <app-icon class="first" 
              [icon]="icon()"
              [version]="iconVersion()" />
    <app-link class="second"
              [href]="href()"
              [ariaLabel]="ariaLabel()"
              [text]="text()"
              [showIcon]="showIcon()"
              [internal]="internal()"/>
  </app-double-li>
